<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceTrack - Aplikasi Keuangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LayoutDashboard, TrendingUp, DollarSign, ArrowUpRight, ArrowDownRight, Activity, Users as UsersIcon } = lucide;

        function App() {
            const [activeMenu, setActiveMenu] = useState('Dashboard');

            const ProfitabilityContent = () => {
                const data = ['Software SaaS', 'Jasa Konsultasi', 'Maintenance IT', 'Cloud Hosting', 'Web Development'];
                return (
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <table className="w-full text-left">
                            <thead><tr className="border-b"><th className="p-4">Produk</th><th className="p-4">Margin</th></tr></thead>
                            <tbody>
                                {data.map((p, i) => (
                                    <tr key={i} className="border-b">
                                        <td className="p-4">{p}</td>
                                        <td className="p-4 font-bold text-green-600">{60 + i * 5}%</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            };

            const DashboardContent = () => (
                <div className="grid grid-cols-3 gap-6">
                    {[ {l: 'Pendapatan', v: '250jt'}, {l: 'Pengeluaran', v: '150jt'}, {l: 'Laba Bersih', v: '100jt'} ].map((item, i) => (
                        <div key={i} className="bg-white p-6 rounded-2xl shadow-sm border">
                            <p className="text-gray-500 text-sm">{item.l}</p>
                            <p className="text-2xl font-bold">{item.v}</p>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="flex min-h-screen">
                    <aside className="w-64 bg-slate-900 text-white p-6">
                        <h1 className="text-xl font-bold mb-8 text-blue-400">FinanceTrack</h1>
                        <nav className="space-y-2">
                            {['Dashboard', 'Profitability'].map(item => (
                                <button key={item} onClick={() => setActiveMenu(item)} className={`w-full p-3 rounded-lg ${activeMenu === item ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                    {item}
                                </button>
                            ))}
                        </nav>
                    </aside>
                    <main className="flex-1 p-8">
                        <h2 className="text-2xl font-bold mb-6">{activeMenu}</h2>
                        {activeMenu === 'Dashboard' ? <DashboardContent /> : <ProfitabilityContent />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
